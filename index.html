<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Web 配置向导</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }
    .header h1 { font-size: 24px; margin-bottom: 8px; }
    .content { padding: 30px; }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #333;
    }
    .form-group .hint {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
    }
    select, input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
    }
    select:focus, input:focus {
      outline: none;
      border-color: #667eea;
    }
    select:disabled, input:disabled {
      background: #f5f5f5;
      cursor: not-allowed;
    }
    .btn {
      padding: 14px 32px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #667eea;
      color: white;
    }
    .btn-primary:hover { background: #5568d3; }
    .btn-secondary {
      background: #e0e0e0;
      color: #333;
    }
    .btn-group {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 24px;
    }
    .hidden { display: none !important; }
    .card {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .card h3 { margin-bottom: 16px; color: #333; }
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .alert {
      padding: 16px;
      border-radius: 8px;
      margin-top: 16px;
    }
    .alert-success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .alert-error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    #apply-result a {
      color: #667eea;
      text-decoration: none;
      word-break: break-all;
    }
    #apply-result a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>OpenClaw Web 配置向导</h1>
      <p>可视化配置 Gateway</p>
    </div>
    
    <div class="content">
      <!-- Step 1: Provider & Model -->
      <div class="card" id="step1">
        <h3>Step 1: 选择 AI 服务商和模型</h3>
        
        <div class="form-group">
          <label>选择服务商 (Provider)</label>
          <select id="provider-select">
            <option value="">-- 请选择服务商 --</option>
          </select>
          <div class="hint" id="provider-hint"></div>
        </div>
        
        <div class="form-group">
          <label>API Key</label>
          <input type="password" id="api-key" placeholder="输入 API Key" disabled>
        </div>
        
        <div class="form-group">
          <label>选择模型</label>
          <select id="model-select" disabled>
            <option value="">-- 请先选择服务商 --</option>
          </select>
          <div class="hint" id="model-loading" class="hidden">加载中...</div>
        </div>
        
        <div class="btn-group">
          <button class="btn btn-primary" id="next-step1" disabled>下一步 →</button>
        </div>
      </div>
      
      <!-- Step 2: Gateway Config -->
      <div class="card hidden" id="step2">
        <h3>Step 2: Gateway 配置</h3>
        
        <div class="form-group">
          <label>端口</label>
          <input type="number" id="gateway-port" value="18789">
        </div>
        
        <div class="form-group">
          <label>绑定模式</label>
          <select id="gateway-bind">
            <option value="lan">LAN (0.0.0.0) - 局域网可访问</option>
            <option value="loopback">Loopback (127.0.0.1) - 仅本地</option>
          </select>
        </div>
        
        <div class="form-group">
          <label>认证模式</label>
          <select id="gateway-auth">
            <option value="token">Token (推荐)</option>
            <option value="password">Password</option>
          </select>
        </div>
        
        <div class="form-group">
          <label>Gateway Token</label>
          <input type="text" id="gateway-token" placeholder="留空自动生成">
        </div>
        
        <div class="btn-group">
          <button class="btn btn-secondary" id="back-step2">← 上一步</button>
          <button class="btn btn-primary" id="apply-config">应用配置</button>
        </div>
      </div>
      
      <!-- Apply Result -->
      <div id="apply-loading" class="hidden" style="text-align: center; padding: 20px;">
        <span class="loading"></span> 正在应用配置...
      </div>
      <div id="apply-result"></div>
    </div>
  </div>
  
  <script>
    let providers = [];
    let models = [];
    let selectedProvider = null;
    let selectedModel = null;
    
    const providerSelect = document.getElementById('provider-select');
    const apiKeyInput = document.getElementById('api-key');
    const modelSelect = document.getElementById('model-select');
    const modelLoading = document.getElementById('model-loading');
    const providerHint = document.getElementById('provider-hint');
    const nextStep1Btn = document.getElementById('next-step1');
    
    // 加载服务商列表
    async function loadProviders() {
      try {
        const res = await fetch('/api/providers');
        providers = await res.json();
        
        providers.forEach(p => {
          const option = document.createElement('option');
          option.value = p.value;
          option.textContent = p.label + (p.hint ? ' - ' + p.hint : '');
          providerSelect.appendChild(option);
        });
      } catch (e) {
        console.error('Failed to load providers:', e);
      }
    }
    
    // 加载 Token
    async function loadToken() {
      try {
        const res = await fetch('/api/token');
        const data = await res.json();
        if (data.token) {
          document.getElementById('gateway-token').value = data.token;
        } else {
          const newRes = await fetch('/api/token', { method: 'POST' });
          const newData = await newRes.json();
          document.getElementById('gateway-token').value = newData.token;
        }
      } catch (e) {
        console.error('Failed to load token:', e);
      }
    }
    
    // 选择服务商
    providerSelect.addEventListener('change', async () => {
      selectedProvider = providerSelect.value;
      const provider = providers.find(p => p.value === selectedProvider);
      
      providerHint.textContent = provider?.hint || '';
      
      if (selectedProvider) {
        apiKeyInput.disabled = false;
        await loadModels(selectedProvider);
      } else {
        apiKeyInput.disabled = true;
        modelSelect.innerHTML = '<option value="">-- 请先选择服务商 --</option>';
        modelSelect.disabled = true;
        nextStep1Btn.disabled = true;
      }
    });
    
    // 选择模型
    modelSelect.addEventListener('change', () => {
      selectedModel = modelSelect.value;
      nextStep1Btn.disabled = !selectedModel;
    });
    
    // 加载模型
    async function loadModels(provider) {
      modelLoading.classList.remove('hidden');
      modelSelect.disabled = true;
      modelSelect.innerHTML = '<option value="">加载中...</option>';
      
      try {
        const url = '/api/models' + (provider ? '?provider=' + encodeURIComponent(provider) : '');
        const res = await fetch(url);
        models = await res.json();
        
        modelLoading.classList.add('hidden');
        
        if (models.length > 0) {
          modelSelect.innerHTML = '';
          models.forEach(m => {
            const option = document.createElement('option');
            option.value = m.key;
            option.textContent = m.key + (m.ctx ? ' (ctx: ' + m.ctx + ')' : '');
            modelSelect.appendChild(option);
          });
          modelSelect.disabled = false;
        } else {
          modelSelect.innerHTML = '<option value="">未找到模型</option>';
        }
      } catch (e) {
        modelLoading.classList.add('hidden');
        modelSelect.innerHTML = '<option value="">加载失败</option>';
        console.error('Failed to load models:', e);
      }
    }
    
    // 下一步
    nextStep1Btn.addEventListener('click', () => {
      document.getElementById('step1').classList.add('hidden');
      document.getElementById('step2').classList.remove('hidden');
    });
    
    // 上一步
    document.getElementById('back-step2').addEventListener('click', () => {
      document.getElementById('step2').classList.add('hidden');
      document.getElementById('step1').classList.remove('hidden');
    });
    
    // 应用配置
    document.getElementById('apply-config').addEventListener('click', async () => {
      const applyLoading = document.getElementById('apply-loading');
      const applyResult = document.getElementById('apply-result');
      
      applyLoading.classList.remove('hidden');
      applyResult.innerHTML = '';
      
      const provider = selectedModel.split('/')[0];
      
      const config = {
        agents: {
          defaults: {
            model: { primary: selectedModel }
          }
        },
        gateway: {
          mode: 'local',
          bind: document.getElementById('gateway-bind').value,
          customBindHost: '0.0.0.0',
          port: parseInt(document.getElementById('gateway-port').value),
          controlUi: {
            enabled: true,
            allowedOrigins: ['*'],
            allowInsecureAuth: true,
            dangerouslyDisableDeviceAuth: true
          },
          auth: {
            mode: document.getElementById('gateway-auth').value,
            token: document.getElementById('gateway-token').value || undefined
          }
        }
      };
      
      try {
        const res = await fetch('/api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(config)
        });
        const result = await res.json();
        
        applyLoading.classList.add('hidden');
        
        if (result.success) {
          const port = document.getElementById('gateway-port').value;
          const token = document.getElementById('gateway-token').value || '自动生成';
          const tokenUrl = token === '自动生成' ? '' : '#token=' + token;
          
          applyResult.innerHTML = '<div class="alert alert-success">' +
            '<strong>✅ 配置已应用!</strong><br><br>' +
            '<strong>配置摘要:</strong><br>' +
            '- 服务商: ' + provider + '<br>' +
            '- 模型: ' + selectedModel + '<br>' +
            '- 端口: ' + port + '<br>' +
            '- Token: ' + token + '<br><br>' +
            '<strong>访问地址:</strong><br>' +
            '<a href="http://' + window.location.hostname + ':' + port + tokenUrl + '" target="_blank">' +
            'http://' + window.location.hostname + ':' + port + tokenUrl + '</a></div>';
        } else {
          applyResult.innerHTML = '<div class="alert alert-error">❌ 错误: ' + result.error + '</div>';
        }
      } catch (e) {
        applyLoading.classList.add('hidden');
        applyResult.innerHTML = '<div class="alert alert-error">❌ 请求失败: ' + e.message + '</div>';
      }
    });
    
    // 初始化
    loadProviders();
    loadToken();
  </script>
</body>
</html>
