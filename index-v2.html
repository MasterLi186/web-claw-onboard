<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Web 配置向导</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }
    .header h1 { font-size: 28px; margin-bottom: 8px; }
    .header p { opacity: 0.9; }
    
    .steps {
      display: flex;
      justify-content: space-between;
      padding: 20px 30px;
      background: #f8f9fa;
      border-bottom: 1px solid #eee;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #999;
      font-size: 14px;
    }
    .step.active { color: #667eea; font-weight: 600; }
    .step.completed { color: #10b981; }
    .step-number {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
    }
    .step.active .step-number { background: #667eea; color: white; }
    .step.completed .step-number { background: #10b981; color: white; }
    
    .content { padding: 30px; }
    
    .form-group { margin-bottom: 24px; }
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #333;
    }
    .form-group .hint {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
    }
    
    select, input[type="text"], input[type="password"], input[type="number"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      transition: border-color 0.2s;
    }
    select:focus, input:focus {
      outline: none;
      border-color: #667eea;
    }
    select:disabled, input:disabled {
      background: #f5f5f5;
      cursor: not-allowed;
    }
    
    .hidden { display: none !important; }
    
    .btn {
      padding: 14px 32px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }
    
    .btn-group {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 30px;
    }
    
    .card {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .card h3 { margin-bottom: 16px; color: #333; }
    
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .alert { padding: 16px; border-radius: 8px; margin-bottom: 20px; }
    .alert-success { background: #d4edda; color: #155724; }
    .alert-error { background: #f8d7da; color: #721c24; }
    .alert-info { background: #d1ecf1; color: #0c5460; }
    
    .gateway-config { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🦞 OpenClaw Web 配置向导</h1>
      <p>按照步骤配置您的 OpenClaw Gateway</p>
    </div>
    
    <div class="steps">
      <div class="step active" id="step1">
        <span class="step-number">1</span><span>选择服务商</span>
      </div>
      <div class="step" id="step2">
        <span class="step-number">2</span><span>配置模型</span>
      </div>
      <div class="step" id="step3">
        <span class="step-number">3</span><span>Gateway</span>
      </div>
      <div class="step" id="step4">
        <span class="step-number">4</span><span>完成</span>
      </div>
    </div>
    
    <div class="content">
      <!-- Step 1: Select Provider -->
      <div id="step1-content">
        <div class="card">
          <h3>Step 1: 选择 AI 服务商</h3>
          <p style="color: #666; margin-bottom: 20px;">
            选择您的 AI 服务提供商，这对应 <code>openclaw onboard</code> 的服务商选择步骤。
          </p>
          
          <div class="form-group">
            <label>选择服务商 (Provider)</label>
            <select id="provider-select">
              <option value="">-- 请选择服务商 --</option>
            </select>
            <div class="hint" id="provider-hint"></div>
          </div>
          
          <div class="form-group">
            <label>API Key</label>
            <input type="password" id="api-key" placeholder="输入 API Key" disabled>
          </div>
          
          <div class="form-group">
            <label>选择模型 (Model)</label>
            <div id="model-loading" class="hidden" style="padding: 10px;">
              <span class="loading"></span> 加载模型列表...
            </div>
            <select id="model-select" disabled>
              <option value="">-- 请先选择服务商 --</option>
            </select>
          </div>
        </div>
        
        <div class="btn-group">
          <button class="btn btn-primary" id="next-step1">下一步 →</button>
        </div>
      </div>
      
      <!-- Step 2: Gateway Config -->
      <div id="step2-content" class="hidden">
        <div class="card">
          <h3>Step 2: Gateway 配置</h3>
          
          <div class="gateway-config">
            <div class="form-group">
              <label>Gateway 端口</label>
              <input type="number" id="gateway-port" value="18789">
            </div>
            
            <div class="form-group">
              <label>绑定模式</label>
              <select id="gateway-bind">
                <option value="loopback">loopback (仅本地)</option>
                <option value="lan" selected>lan (局域网)</option>
                <option value="auto">auto (自动)</option>
              </select>
            </div>
            
            <div class="form-group">
              <label>认证模式</label>
              <select id="gateway-auth">
                <option value="token" selected>Token (推荐)</option>
                <option value="password">Password (密码)</option>
              </select>
            </div>
            
            <div class="form-group">
              <label>Gateway Token</label>
              <input type="text" id="gateway-token" placeholder="留空自动生成">
            </div>
          </div>
        </div>
        
        <div class="btn-group">
          <button class="btn btn-secondary" id="back-step2">← 上一步</button>
          <button class="btn btn-primary" id="next-step2">下一步 →</button>
        </div>
      </div>
      
      <!-- Step 3: Apply -->
      <div id="step3-content" class="hidden">
        <div class="card">
          <h3>Step 3: 应用配置</h3>
          <div id="config-preview"></div>
          <div id="apply-loading" class="hidden" style="text-align: center; padding: 20px;">
            <span class="loading"></span> 正在应用配置...
          </div>
          <div id="apply-result"></div>
        </div>
        
        <div class="btn-group">
          <button class="btn btn-secondary" id="back-step3">← 上一步</button>
          <button class="btn btn-primary" id="apply-config">应用配置</button>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    // State
    let providers = [];
    let models = [];
    let selectedProvider = null;
    let selectedModel = null;
    
    const providerSelect = document.getElementById('provider-select');
    const apiKeyInput = document.getElementById('api-key');
    const modelSelect = document.getElementById('model-select');
    const modelLoading = document.getElementById('model-loading');
    
    // 加载服务商列表
    async function loadProviders() {
      try {
        const res = await fetch('/api/auth-groups');
        providers = await res.json();
        
        providers.forEach(p => {
          const option = document.createElement('option');
          option.value = p.value;
          option.textContent = p.label + (p.hint ? ' - ' + p.hint : '');
          providerSelect.appendChild(option);
        });
      } catch (e) {
        console.error('Failed to load providers:', e);
      }
    
    // 加载已有 token
    async function loadToken() {
      try {
        const res = await fetch('/api/token');
        const data = await res.json();
        if (data.token) {
          document.getElementById('gateway-token').value = data.token;
        } else {
          // 首次无 token，自动生成
          const newRes = await fetch('/api/token', { method: 'POST' });
          const newData = await newRes.json();
          document.getElementById('gateway-token').value = newData.token;
        }
      } catch (e) {
        console.error('Failed to load token:', e);
      }
    }
    
    // 选择服务商
    providerSelect.addEventListener('change', async () => {
      selectedProvider = providerSelect.value;
      const provider = providers.find(p => p.value === selectedProvider);
      
      document.getElementById('provider-hint').textContent = provider?.hint || '';
      
      if (selectedProvider) {
        apiKeyInput.disabled = false;
        await loadModels(selectedProvider);
      } else {
        apiKeyInput.disabled = true;
        modelSelect.innerHTML = '<option value="">-- 请先选择服务商 --</option>';
        modelSelect.disabled = true;
      }
    });
    
    // 加载模型
    async function loadModels(provider) {
      modelLoading.classList.remove('hidden');
      modelSelect.disabled = true;
      modelSelect.innerHTML = '<option value="">加载中...</option>';
      
      try {
        const url = '/api/models' + (provider ? '?provider=' + encodeURIComponent(provider) : '');
        const res = await fetch(url);
        models = await res.json();
        
        modelLoading.classList.add('hidden');
        
        if (models.length > 0) {
          modelSelect.innerHTML = '<option value="">-- 选择模型 --</option>';
          models.forEach(m => {
            const option = document.createElement('option');
            option.value = m.key;
            option.textContent = m.key + (m.ctx ? ' (' + m.ctx + ' ctx)' : '');
            modelSelect.appendChild(option);
          });
          modelSelect.disabled = false;
        } else {
          modelSelect.innerHTML = '<option value="">-- 未找到模型 --</option>';
        }
      } catch (e) {
        console.error('Failed to load models:', e);
        modelLoading.classList.add('hidden');
        modelSelect.innerHTML = '<option value="">加载失败</option>';
      }
    }
    
    modelSelect.addEventListener('change', () => {
      selectedModel = modelSelect.value;
    });
    
    // 导航
    document.getElementById('next-step1').addEventListener('click', () => {
      if (!selectedProvider) { alert('请选择服务商'); return; }
      if (!selectedModel) { alert('请选择模型'); return; }
      
      document.getElementById('step1-content').classList.add('hidden');
      document.getElementById('step2-content').classList.remove('hidden');
      document.getElementById('step1').classList.remove('active');
      document.getElementById('step1').classList.add('completed');
      document.getElementById('step2').classList.add('active');
    });
    
    document.getElementById('back-step2').addEventListener('click', () => {
      document.getElementById('step2-content').classList.add('hidden');
      document.getElementById('step1-content').classList.remove('hidden');
      document.getElementById('step2').classList.remove('active');
      document.getElementById('step1').classList.remove('completed');
      document.getElementById('step1').classList.add('active');
    });
    
    document.getElementById('next-step2').addEventListener('click', () => {
      const preview = document.getElementById('config-preview');
      preview.innerHTML = '<div class="alert alert-info"><strong>配置摘要:</strong><br>服务商: ' + selectedProvider + '<br>模型: ' + selectedModel + '<br>端口: ' + document.getElementById('gateway-port').value + '<br>绑定: ' + document.getElementById('gateway-bind').value + '</div>';
      
      document.getElementById('step2-content').classList.add('hidden');
      document.getElementById('step3-content').classList.remove('hidden');
      document.getElementById('step2').classList.remove('active');
      document.getElementById('step2').classList.add('completed');
      document.getElementById('step3').classList.add('active');
    });
    
    document.getElementById('back-step3').addEventListener('click', () => {
      document.getElementById('step3-content').classList.add('hidden');
      document.getElementById('step2-content').classList.remove('hidden');
      document.getElementById('step3').classList.remove('active');
      document.getElementById('step2').classList.add('active');
    });
    
    // 应用配置
    document.getElementById('apply-config').addEventListener('click', async () => {
      const applyLoading = document.getElementById('apply-loading');
      const applyResult = document.getElementById('apply-result');
      
      applyLoading.classList.remove('hidden');
      applyResult.innerHTML = '';
      
      const provider = selectedModel.split('/')[0];
      const config = {
        models: {
          providers: {
            [provider]: {
              api: provider === 'anthropic' ? 'anthropic-messages' : 'openai-completions',
              apiKey: apiKeyInput.value || 'sk-placeholder'
            }
          }
        },
        agents: {
          defaults: {
            model: { primary: selectedModel }
          }
        },
        gateway: {
          bind: document.getElementById('gateway-bind').value,
          port: parseInt(document.getElementById('gateway-port').value),
          auth: {
            mode: document.getElementById('gateway-auth').value,
            token: document.getElementById('gateway-token').value || undefined
          }
        }
      // 只保留 gateway 和 agents 配置，不发送不完整的 models.providers
      const config = {
        agents: {
          defaults: {
            model: { primary: selectedModel }
          }
        },
        gateway: {
          bind: document.getElementById('gateway-bind').value,
          port: parseInt(document.getElementById('gateway-port').value),
          auth: {
            mode: document.getElementById('gateway-auth').value,
            token: document.getElementById('gateway-token').value || undefined
          }
        }
      };
      
      try {
        const res = await fetch('/api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(config)
        });
        const result = await res.json();
        
        applyLoading.classList.add('hidden');
        
        if (result.success) {
          const port = document.getElementById('gateway-port').value;
        if (result.success) {
          const port = document.getElementById('gateway-port').value;
          const token = document.getElementById('gateway-token').value || '自动生成';
          const tokenUrl = token === '自动生成' ? '' : '#token=' + token;
          applyResult.innerHTML = '<div class="alert alert-success"><strong>✅ 配置已应用!</strong><br><br>' +
            '<strong>配置摘要:</strong><br>' +
            '- 服务商: ' + provider + '<br>' +
            '- 模型: ' + selectedModel + '<br>' +
            '- 端口: ' + port + '<br>' +
            '- 绑定: ' + document.getElementById('gateway-bind').value + '<br>' +
            '- Token: ' + token + '<br><br>' +
            '<strong>访问地址:</strong><br>' +
            '<a href="http://' + window.location.hostname + ':' + port + tokenUrl + '" target="_blank">http://' + window.location.hostname + ':' + port + tokenUrl + '</a></div>';
          document.getElementById('step3').classList.remove('active');
          document.getElementById('step3').classList.add('completed');
          document.getElementById('step4').classList.add('completed');
        } else {
          applyResult.innerHTML = '<div class="alert alert-error">❌ 错误: ' + result.error + '</div>';
        }
      } catch (e) {
        applyLoading.classList.add('hidden');
        applyResult.innerHTML = '<div class="alert alert-error">❌ 请求失败: ' + e.message + '</div>';
      }
    });
    
    loadProviders();
    loadToken();
  </script>
</body>
</html>
